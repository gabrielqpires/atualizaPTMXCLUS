name: Sync Metabase (1h)

# Gatilho de 1 em 1 hora + botão manual (workflow_dispatch).
# ~720 min/mês — dentro dos 2.000 grátis do GitHub Actions em repo privado.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar /api/sync
        run: |
          curl -fsS -X GET "${{ secrets.SYNC_URL }}/api/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
